caches:
  - name: with_fallback
    cache_key:
      - cache-e2e-fallback
      - { env: BUILDKITE_BUILD_ID, fallbackLimit: true }
      - { env: CACHE_VARIANT }
    target_paths:
      - fallback-src
  - name: without_fallback
    cache_key:
      - cache-e2e-nofallback
      - { env: BUILDKITE_BUILD_ID }
      - { env: CACHE_VARIANT }
    target_paths:
      - nofallback-src
